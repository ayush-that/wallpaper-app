name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-release:
    runs-on: macos-15
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install tools
        run: brew install xcodegen create-dmg xcbeautify swiftformat

      - name: Import Developer ID certificate
        env:
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 7200 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          printf '%s' "$CERT_BASE64" | base64 -d > "$CERT_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

      - name: Store notarytool credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -euo pipefail
          xcrun notarytool store-credentials mural \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Lint
        run: ./scripts/lint.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Mural Release (unsigned; sign step follows)
        run: |
          set -o pipefail
          xcodebuild -scheme Mural -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_REQUIRED=NO \
            build | xcbeautify --is-ci

      - name: Build muralctl Release (unsigned)
        run: |
          set -o pipefail
          xcodebuild -scheme muralctl -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build | xcbeautify --is-ci

      - name: Sign + notarise app
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID_NAME }}
          KEYCHAIN_PROFILE: mural
        run: scripts/sign-and-notarize.sh build/Build/Products/Release/Mural.app

      - name: Build DMG
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID_NAME }}
          KEYCHAIN_PROFILE: mural
        run: scripts/make-dmg.sh build/Build/Products/Release/Mural.app

      - name: Generate Sparkle appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: scripts/make-appcast.sh dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Mural-*.dmg
            dist/appcast/appcast.xml
          generate_release_notes: true

      - name: Publish appcast to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/appcast
          keep_files: true

      - name: Sync cask to ayush-that/homebrew-mural tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN not set, skipping tap sync. Add the secret to enable."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="dist/Mural-${VERSION}.dmg"
          if [ ! -f "$DMG" ]; then
            echo "fatal: $DMG not found (release build skipped DMG step?)" >&2
            exit 1
          fi
          SHA="$(shasum -a 256 "$DMG" | awk '{print $1}')"

          TAP_DIR="$(mktemp -d)"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/ayush-that/homebrew-mural.git" "$TAP_DIR"
          CASK="$TAP_DIR/Casks/mural.rb"

          sed -i.bak -E "s|^  version \".*\"|  version \"${VERSION}\"|" "$CASK"
          sed -i.bak -E "s|^  sha256 \".*\"|  sha256 \"${SHA}\"|" "$CASK"
          rm -f "${CASK}.bak"

          cd "$TAP_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet Casks/mural.rb; then
            echo "Cask already at version ${VERSION}, nothing to push."
            exit 0
          fi
          git add Casks/mural.rb
          git commit -m "feat(mural): bump to ${VERSION}"
          git push origin main
