name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build-test:
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Install tools
        run: brew install xcodegen swiftformat xcbeautify
      - name: Lint
        run: ./scripts/lint.sh
      - name: Generate project
        run: xcodegen generate
      - name: Build
        run: |
          set -o pipefail
          xcodebuild -scheme Mural -configuration Debug \
            -destination 'platform=macOS' build | xcbeautify --is-ci
      - name: Test
        run: |
          set -o pipefail
          xcodebuild test -scheme Mural -destination 'platform=macOS' \
            -resultBundlePath TestResults.xcresult | xcbeautify --is-ci
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult
          path: TestResults.xcresult
