name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build-test:
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: List installed Xcodes (diagnostic)
        run: ls /Applications | grep -i xcode || true
      - name: Select newest installed Xcode
        run: |
          NEWEST=$(ls /Applications | grep -E '^Xcode(_[0-9.]+)?\.app$' | sort -V | tail -1)
          echo "Selecting: $NEWEST"
          sudo xcode-select -s "/Applications/$NEWEST/Contents/Developer"
          xcodebuild -version
      - name: Install tools
        run: brew install xcodegen swiftformat xcbeautify
      - name: Lint
        run: ./scripts/lint.sh
      - name: Generate project
        run: xcodegen generate
      - name: Inspect generated project format (diagnostic)
        run: grep -E "objectVersion|compatibilityVersion" Mural.xcodeproj/project.pbxproj | head -3 || true
      - name: Build
        run: |
          set -o pipefail
          xcodebuild -scheme Mural -configuration Debug \
            -destination 'platform=macOS' build | xcbeautify --is-ci
      - name: Test
        run: |
          set -o pipefail
          xcodebuild test -scheme Mural -destination 'platform=macOS' \
            -resultBundlePath TestResults.xcresult | xcbeautify --is-ci
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult
          path: TestResults.xcresult
