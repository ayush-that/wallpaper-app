# Pre-commit hooks for Mural.
#
# One-time setup (required - a clone without this has NO commit gate):
#   brew install pre-commit xcodegen swiftformat swiftlint xcbeautify
#   pre-commit install
#
# Run the full gate on demand:
#   pre-commit run --all-files
#
# The `preflight` hook runs scripts/preflight.sh, which mirrors the CI
# build-test job exactly: lint + format (scripts/lint.sh), then xcodegen,
# build, and the full test suite. It runs once per commit (not per file), so a
# commit cannot land unless it would pass CI. Lint and format authority lives
# in scripts/lint.sh (SwiftFormat in --lint mode + SwiftLint --strict); if it
# reports formatting issues, fix them with:
#   swiftformat App Sources Tests Tools

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: preflight
        name: preflight (lint, format, build, test - CI parity)
        entry: scripts/preflight.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
